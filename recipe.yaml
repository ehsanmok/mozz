package:
  name: mozz
  version: "0.1.2"

source:
  path: .

build:
  script:
    - mkdir -p $PREFIX/lib/mojo
    - cp -r mozz $PREFIX/lib/mojo/

requirements:
  host:
    - mojo ==1.0.0b1
  run:
    - mojo ==1.0.0b1

about:
  homepage: https://github.com/ehsanmok/mozz
  license: MIT
  summary: Pure-Mojo fuzzing and property-based testing library
  description: |
    mozz is a zero-external-dependency fuzzing and property-based testing
    library for Mojo.  Features include:

    - Raw byte fuzzing via fuzz() with mutation-based input generation
    - Typed property tests via forall[T]() with Arbitrary trait
    - Byte property tests via forall_bytes()
    - Standalone delta-debugging minimizer (shrink_bytes)
    - Crash deduplication, replay, and report generation
    - Pure Mojo — no libFuzzer, no compiler flags required
